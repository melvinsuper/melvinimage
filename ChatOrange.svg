<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFF4E8"></stop>
      <stop offset="35%" stop-color="#FFD2A6"></stop>
      <stop offset="70%" stop-color="#F78A2F"></stop>
      <stop offset="100%" stop-color="#C95A12"></stop>
    </linearGradient>

    <radialGradient id="orb1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(340 220) rotate(25) scale(420 320)">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"></stop>
      <stop offset="45%" stop-color="#FFD8B2" stop-opacity="0.55"></stop>
      <stop offset="100%" stop-color="#FFD8B2" stop-opacity="0"></stop>
    </radialGradient>

    <radialGradient id="orb2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1180 220) rotate(-12) scale(380 280)">
      <stop offset="0%" stop-color="#FFF1E3" stop-opacity="0.9"></stop>
      <stop offset="50%" stop-color="#FFB777" stop-opacity="0.45"></stop>
      <stop offset="100%" stop-color="#FFB777" stop-opacity="0"></stop>
    </radialGradient>

    <radialGradient id="orb3" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1160 720) rotate(8) scale(520 360)">
      <stop offset="0%" stop-color="#FFCF9D" stop-opacity="0.7"></stop>
      <stop offset="55%" stop-color="#F2701A" stop-opacity="0.28"></stop>
      <stop offset="100%" stop-color="#F2701A" stop-opacity="0"></stop>
    </radialGradient>

    <linearGradient id="lineGrad" x1="210" y1="140" x2="1320" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.34"></stop>
      <stop offset="100%" stop-color="#FFF0E0" stop-opacity="0.04"></stop>
    </linearGradient>

    <filter id="blurXL" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="60"></feGaussianBlur>
    </filter>

    <filter id="blurL" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="34"></feGaussianBlur>
    </filter>

    <filter id="noise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"></feTurbulence>
      <feColorMatrix type="saturate" values="0"></feColorMatrix>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.03"></feFuncA>
      </feComponentTransfer>
    </filter>

    <clipPath id="clip">
      <rect width="1600" height="900" rx="0" fill="white"></rect>
    </clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <rect width="1600" height="900" fill="url(#bg)"></rect>

    <g filter="url(#blurXL)">
      <ellipse cx="340" cy="220" rx="420" ry="320" fill="url(#orb1)"></ellipse>
      <ellipse cx="1180" cy="220" rx="380" ry="280" fill="url(#orb2)"></ellipse>
      <ellipse cx="1160" cy="720" rx="520" ry="360" fill="url(#orb3)"></ellipse>
    </g>

    <g opacity="0.26">
      <path d="M-80 690C210 540 420 500 690 560C970 620 1210 560 1680 300" stroke="url(#lineGrad)" stroke-width="1.6"></path>
      <path d="M-40 760C250 620 500 590 760 640C1040 694 1270 646 1640 420" stroke="url(#lineGrad)" stroke-width="1.2"></path>
      <path d="M120 120C420 180 650 260 930 230C1180 202 1350 130 1540 30" stroke="url(#lineGrad)" stroke-width="1.1"></path>
    </g>

    <g opacity="0.16">
      <circle cx="1240" cy="160" r="84" fill="none" stroke="#FFF7EF" stroke-width="1.4"></circle>
      <circle cx="1240" cy="160" r="132" fill="none" stroke="#FFF7EF" stroke-width="1"></circle>
      <circle cx="280" cy="700" r="110" fill="none" stroke="#FFF1E5" stroke-width="1"></circle>
    </g>

    <g filter="url(#blurL)" opacity="0.28">
      <rect x="150" y="110" width="620" height="220" rx="110" transform="rotate(-8 150 110)" fill="#FFF5EC"></rect>
      <rect x="980" y="530" width="420" height="160" rx="80" transform="rotate(12 980 530)" fill="#FFB978"></rect>
    </g>

    <rect width="1600" height="900" fill="#FFFFFF" opacity="0.04"></rect>
    <rect width="1600" height="900" filter="url(#noise)"></rect>
  </g>
</svg>